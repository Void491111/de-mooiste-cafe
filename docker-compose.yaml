services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mooiste-app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    networks:
      - mooiste

  mysql:
    image: mysql:8.0
    container_name: mooiste-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: mooiste_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: mooiste
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mooiste

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mooiste-pma
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - mooiste

networks:
  mooiste:

volumes:
  mysql_data: